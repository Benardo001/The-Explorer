<!DOCTYPE html>
<html>
<head>
    <title>CoastExplorer</title>
</head>
<body>

<h1>🌴 Welcome, {{ request.user.username }}</h1>

<a href="/logout/">Logout</a>

<hr>

{% for beach in beaches %}
    <div>
        <h2>{{ beach.name }}</h2>
        <p>{{ beach.location }}</p>
        <p>{{ beach.description }}</p>
    </div>
{% endfor %}

</body>
</html>
