<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="transportGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#transportGradient)"/>

  <!-- Road -->
  <rect x="0" y="450" width="800" height="150" fill="#374151"/>
  <rect x="0" y="520" width="800" height="10" fill="#FCD34D" opacity="0.8"/>

  <!-- Bus -->
  <rect x="200" y="400" width="180" height="80" fill="#DC2626" rx="10"/>
  <rect x="210" y="410" width="40" height="40" fill="#1F2937"/>
  <rect x="260" y="410" width="40" height="40" fill="#1F2937"/>
  <rect x="310" y="410" width="40" height="40" fill="#1F2937"/>
  <rect x="360" y="420" width="15" height="30" fill="#FCD34D"/>
  <circle cx="220" cy="490" r="15" fill="#1F2937"/>
  <circle cx="340" cy="490" r="15" fill="#1F2937"/>
  <circle cx="220" cy="490" r="8" fill="#FCD34D"/>
  <circle cx="340" cy="490" r="8" fill="#FCD34D"/>

  <!-- Car -->
  <rect x="500" y="430" width="120" height="50" fill="#059669" rx="8"/>
  <rect x="510" y="440" width="25" height="25" fill="#1F2937"/>
  <rect x="545" y="440" width="25" height="25" fill="#1F2937"/>
  <circle cx="520" cy="485" r="12" fill="#1F2937"/>
  <circle cx="580" cy="485" r="12" fill="#1F2937"/>
  <circle cx="520" cy="485" r="6" fill="#FCD34D"/>
  <circle cx="580" cy="485" r="6" fill="#FCD34D"/>

  <!-- Text -->
  <text x="400" y="100" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="36" font-weight="bold">TRANSPORT</text>
  <text x="400" y="140" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="18">SERVICES</text>
  <text x="400" y="550" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="16">Reliable Transportation for Your Journey</text>
</svg>