<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Beach | CoastExplorer</title>
    <style>
        body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;padding:30px;}
        .box{max-width:600px;margin:auto;background:#fff;padding:28px;border-radius:24px;box-shadow:0 18px 50px rgba(15,23,42,.08);}
        h1{color:#dc2626;margin-bottom:20px;}
        p{margin-bottom:22px;}
        form{display:flex;gap:14px;flex-wrap:wrap;}
        button{padding:14px 18px;border:none;border-radius:14px;color:white;cursor:pointer;}
        .delete{background:#dc2626;}
        .cancel{background:#475569;}
        a{color:white;text-decoration:none;}
    </style>
</head>
<body>
<div class="box">
    <h1>Delete Beach</h1>
    <p>Are you sure you want to delete <strong>{{ beach.name }}</strong>? This action cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="delete">Yes, delete</button>
    </form>
    <p style="margin-top:18px;"><a class="cancel" href="{% url 'home' %}">Cancel</a></p>
</div>
</body>
</html>
