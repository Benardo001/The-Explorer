<!DOCTYPE html>
<html>
<head>
    <title>CoastExplorer Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 15px;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #0077b6;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #023e8a;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="login-box">
        <h2>🌴 CoastExplorer</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p style="margin-top:18px;color:#0f172a;">Don't have an account? <a href="{% url 'signup' %}" style="color:#0077b6;text-decoration:none;">Sign up</a>.</p>
    </div>
</div>

</body>
</html>
